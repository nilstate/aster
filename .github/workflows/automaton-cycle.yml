name: automaton-cycle

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: "11 */3 * * *"

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: automaton-cycle
  cancel-in-progress: true

jobs:
  automaton-cycle:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.AUTOMATON_GH_TOKEN != '' && secrets.AUTOMATON_GH_TOKEN || github.token }}
    steps:
      - name: Check out automaton
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run assess-discover-score-select cycle
        run: |
          mkdir -p .artifacts/automaton-cycle
          node scripts/automaton-cycle.mjs \
            --repo-root "$GITHUB_WORKSPACE" \
            --repo "${{ github.repository }}" \
            --dispatch \
            --dispatch-ref "${{ github.ref_name || 'main' }}" \
            --output "$GITHUB_WORKSPACE/.artifacts/automaton-cycle/result.json" \
            --summary-output "$GITHUB_WORKSPACE/.artifacts/automaton-cycle/summary.md"
          cat "$GITHUB_WORKSPACE/.artifacts/automaton-cycle/result.json"

      - name: Append workflow summary
        run: cat .artifacts/automaton-cycle/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload cycle artifacts
        uses: actions/upload-artifact@v7
        with:
          name: automaton-cycle
          path: .artifacts/automaton-cycle
