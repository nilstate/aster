name: collaboration-record

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  issues:
    types:
      - opened
      - edited
      - reopened
  workflow_dispatch:
    inputs:
      target_repo:
        description: Repo containing the collaboration issue. Defaults to this repo.
        required: false
        type: string
      issue_number:
        description: Collaboration issue number to process explicitly.
        required: true
        type: string

permissions:
  actions: write
  contents: read
  issues: read

concurrency:
  group: collaboration-record-${{ github.event.inputs.target_repo || github.repository }}-${{ github.event.issue.number || github.event.inputs.issue_number }}
  cancel-in-progress: true

jobs:
  collaboration-record:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        startsWith(github.event.issue.title, '[collaboration]') ||
        contains(github.event.issue.body, 'aster:thread-teaching-record')
      }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.ASTER_GH_TOKEN != '' && secrets.ASTER_GH_TOKEN || github.token }}
    steps:
      - name: Check out aster
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Resolve issue envelope
        id: issue
        env:
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          EVENT_ISSUE_TITLE: ${{ github.event.issue.title }}
          EVENT_ISSUE_BODY: ${{ github.event.issue.body }}
          EVENT_ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          mkdir -p .artifacts/collaboration-record
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET_REPO="${{ github.event.inputs.target_repo || github.repository }}"
            gh issue view "${{ github.event.inputs.issue_number }}" \
              --repo "$TARGET_REPO" \
              --json number,title,body,url \
              > .artifacts/collaboration-record/issue.json
          else
            TARGET_REPO="${{ github.repository }}"
            jq -n \
              --arg number "$EVENT_ISSUE_NUMBER" \
              --arg title "$EVENT_ISSUE_TITLE" \
              --arg body "$EVENT_ISSUE_BODY" \
              --arg url "$EVENT_ISSUE_URL" \
              '{number: ($number | tonumber), title: $title, body: $body, url: $url}' \
              > .artifacts/collaboration-record/issue.json
          fi
          echo "target_repo=$TARGET_REPO" >> "$GITHUB_OUTPUT"
          echo "number=$(jq -r '.number' .artifacts/collaboration-record/issue.json)" >> "$GITHUB_OUTPUT"
          echo "url=$(jq -r '.url' .artifacts/collaboration-record/issue.json)" >> "$GITHUB_OUTPUT"

      - name: Build collaboration packet
        id: packet
        run: |
          node scripts/build-collaboration-record-packet.mjs \
            --input .artifacts/collaboration-record/issue.json \
            --repo "${{ steps.issue.outputs.target_repo }}" \
            --output .artifacts/collaboration-record/packet.json
          STATUS="$(jq -r '.status' .artifacts/collaboration-record/packet.json)"
          MODE="$(jq -r '.classification.mode' .artifacts/collaboration-record/packet.json)"
          REASON="$(jq -r '.classification.reason' .artifacts/collaboration-record/packet.json)"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" = "accepted" ]; then
            echo "Accepted canonical collaboration record." >> "$GITHUB_STEP_SUMMARY"
            jq -r '"- kind: " + .record.kind' .artifacts/collaboration-record/packet.json >> "$GITHUB_STEP_SUMMARY"
            jq -r '"- summary: " + .record.summary' .artifacts/collaboration-record/packet.json >> "$GITHUB_STEP_SUMMARY"
            jq -r '"- target repo: " + .record.target_repo' .artifacts/collaboration-record/packet.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Collaboration record is held for repair." >> "$GITHUB_STEP_SUMMARY"
            echo "- reason: $REASON" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Queue thread teaching derive refresh
        if: ${{ steps.packet.outputs.status == 'accepted' }}
        run: |
          gh workflow run thread-teaching-derive.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name || github.event.repository.default_branch || 'main' }}"

      - name: Publish evidence
        if: ${{ always() }}
        env:
          RUNX_PUBLIC_EVIDENCE_API_BASE_URL: ${{ vars.RUNX_PUBLIC_EVIDENCE_API_BASE_URL || 'https://api.runx.ai' }}
          RUNX_PUBLIC_EVIDENCE_TOKEN: ${{ secrets.RUNX_PUBLIC_EVIDENCE_TOKEN }}
        run: |
          ISSUE_NUM="${{ steps.issue.outputs.number }}"
          TARGET="${{ steps.issue.outputs.target_repo }}"
          if [ "${{ steps.packet.outputs.status }}" = "accepted" ]; then
            FEED_STATUS="success"
            TITLE="recorded collaboration evidence for issue #${ISSUE_NUM} on ${TARGET}"
            SUMMARY="accepted a canonical collaboration record and queued thread-teaching derivation"
          else
            FEED_STATUS="paused"
            TITLE="held collaboration evidence for issue #${ISSUE_NUM} on ${TARGET}"
            SUMMARY="collaboration issue is not a valid canonical thread-teaching record"
          fi
          curl --fail --silent --show-error \
            -X POST \
            -H "authorization: Bearer ${RUNX_PUBLIC_EVIDENCE_TOKEN}" \
            -H "content-type: application/json" \
            --data "$(jq -n \
              --arg title "$TITLE" \
              --arg summary "$SUMMARY" \
              --arg status "$FEED_STATUS" \
              --arg repo "$TARGET" \
              --arg workflow "collaboration-record" \
              --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg reason "${{ steps.packet.outputs.reason }}" \
              '{events: [{
                kind: "aster_run",
                source: "github-actions",
                status: $status,
                title: $title,
                summary: $summary,
                repo: $repo,
                workflow: $workflow,
                url: $url,
                timestamp: (now | todate),
                metadata: {
                  lane: "collaboration-record",
                  feed_channel: "ops",
                  main_feed_eligible: false,
                  quiet_reason: (if $reason == "" then null else $reason end)
                }
              }]}')" \
            "${RUNX_PUBLIC_EVIDENCE_API_BASE_URL%/}/v1/admin/public/evidence" || true

      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: collaboration-record-${{ steps.issue.outputs.number || github.event.issue.number || github.event.inputs.issue_number }}
          path: .artifacts/collaboration-record

      - name: Enforce collaboration record validity
        if: ${{ steps.packet.outputs.status != 'accepted' }}
        run: |
          echo "Collaboration record is invalid: ${{ steps.packet.outputs.reason }}" >&2
          exit 1
