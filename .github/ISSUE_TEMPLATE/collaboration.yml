name: Collaboration
description: Record approval, lessons, norms, or publish authorization as canonical thread teaching.
title: "[collaboration] "
body:
  - type: markdown
    attributes:
      value: |
        Use the canonical thread-teaching record block below.

        The live gate parser reads this block directly from the issue body, so
        keep the marker and field names intact. Edit the values in place.
  - type: textarea
    id: record
    attributes:
      label: Thread Teaching Record
      description: Canonical approval or teaching record read by the gate parser.
      render: markdown
      value: |
        <!-- aster:thread-teaching-record -->
        Kind: publish_authorization
        Summary: One bounded draft PR may be published for this repo.
        Recorded By: kam
        Target Repo: nilstate/runx
        Subject Locator: nilstate/runx
        Objective Fingerprint:
        Applies To: docs-pr.publish
        Invariant: Keep the change bounded and reviewable.
        Note: Add repo-specific or scope-specific teaching here.
        Decision: docs-pr.publish = allow | bounded draft publication is approved
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Optional Rationale
      description: Extra human context for reviewers. This can be plain prose.
